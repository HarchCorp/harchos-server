name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --ignore E501
        continue-on-error: true

      - name: Run tests
        env:
          HARCHOS_SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/ -v --tb=short

  test-postgres:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: harchos
          POSTGRES_PASSWORD: harchos_dev
          POSTGRES_DB: harchos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests with PostgreSQL
        env:
          HARCHOS_DATABASE_URL: postgresql+asyncpg://harchos:harchos_dev@localhost:5432/harchos_test
          HARCHOS_SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: [test, test-postgres]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t harchos-server:ci .
