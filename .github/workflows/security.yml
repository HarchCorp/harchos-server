name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pip-audit bandit
          pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit --desc
        continue-on-error: true

      - name: Run bandit
        run: bandit -r app/ -ll
        continue-on-error: true
