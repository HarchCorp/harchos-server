version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # All vars use HARCHOS_ prefix — override in production with real values
      - HARCHOS_DATABASE_URL=postgresql+asyncpg://harchos:changeme@postgres:5432/harchos
      - HARCHOS_SECRET_KEY=${HARCHOS_SECRET_KEY:-}  # MUST be set for production
      - HARCHOS_DEBUG=true
      - HARCHOS_ENVIRONMENT=dev
      - HARCHOS_ELECTRICITY_MAPS_API_KEY=${HARCHOS_ELECTRICITY_MAPS_API_KEY:-}
      - HARCHOS_UPSTASH_REDIS_URL=${HARCHOS_UPSTASH_REDIS_URL:-}
      - HARCHOS_UPSTASH_REDIS_TOKEN=${HARCHOS_UPSTASH_REDIS_TOKEN:-}
      - HARCHOS_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      # Default dev credentials — override POSTGRES_PASSWORD in production
      POSTGRES_USER: ${POSTGRES_USER:-harchos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: harchos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harchos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
