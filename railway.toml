[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.env]]
name = "HARCHOS_DATABASE_URL"
value = "sqlite+aiosqlite:///./harchos.db"

[[deploy.env]]
name = "HARCHOS_DEBUG"
value = "false"

[[deploy.env]]
name = "HARCHOS_ENVIRONMENT"
value = "production"

[[deploy.env]]
name = "HARCHOS_SECRET_KEY"
value = "harchos-prod-secret-key-2026"

[[deploy.env]]
name = "HARCHOS_CORS_ORIGINS"
value = "[\"*\"]"

[[deploy.env]]
name = "HARCHOS_DEFAULT_API_KEY"
value = "hsk_prod_e2e_test_2026_morocco"

[[deploy.env]]
name = "HARCHOS_ADMIN_BOOTSTRAP_TOKEN"
value = "harchos-bootstrap-admin-2026-secure"
